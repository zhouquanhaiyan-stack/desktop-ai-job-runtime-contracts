name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Compile check
        run: python -m py_compile src/desktop_ai_job_runtime_contracts/*.py examples/run_fake_job.py

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Run example
        run: python examples/run_fake_job.py
